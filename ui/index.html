<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Harness Comparison — Precisely MCP</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Precisely brand — light mode
       Purple #7F16E0  Navy #001B4C  Amber #FAB511  Magenta #E5007E */
    :root {
      font-family: -apple-system, system-ui, sans-serif;
      --bg:           #F5F6FA;
      --surface:      #FFFFFF;
      --border:       #E2E4EE;
      --purple:       #7F16E0;
      --purple-tint:  #F3EAFF;
      --purple-dim:   #39006A;
      --navy:         #001B4C;
      --amber:        #FAB511;
      --amber-tint:   #FFF9E6;
      --magenta:      #E5007E;
      --text:         #001B4C;
      --text-mid:     #3D4A6B;
      --text-dim:     #8B93A8;
      --ok:           #059669;
      --err:          #E5007E;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo { font-size: 15px; font-weight: 800; letter-spacing: 1px; color: var(--purple); text-transform: uppercase; }
    .header-sep { width: 1px; height: 20px; background: var(--border); }
    .header-title { font-size: 14px; color: var(--text-mid); font-weight: 400; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      background: transparent;
      border: 0;
      border-bottom: 2px solid transparent;
      color: var(--text-mid);
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 0;
    }
    .tab:hover:not(.active) { color: var(--text); background: transparent; }
    .tab.active { color: var(--purple); border-bottom-color: var(--purple); }
    .view { display: none; }
    .view.active { display: block; }

    /* ── Controls ── */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .controls-hint { font-size: 12px; color: var(--text-dim); margin: -4px 0 0; text-align: center; }

    /* Model cards */
    .model-cards { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .model-card {
      position: relative;
      width: 160px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      user-select: none;
    }
    .model-card:hover:not(.disabled) {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(127,22,224,0.08);
    }
    .model-card.selected {
      border-color: var(--purple);
      background: var(--purple-tint);
      box-shadow: 0 0 0 3px rgba(127,22,224,0.12);
    }
    .model-card.disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .model-card input[type="radio"] { display: none; }
    .card-provider {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 3px;
    }
    .model-card.selected .card-provider { color: var(--purple); }
    .card-model-id {
      font-size: 11px;
      font-family: ui-monospace, 'SF Mono', monospace;
      color: var(--text-dim);
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      padding: 1px 2px;
      width: 100%;
      cursor: pointer;
      outline: none;
      margin-top: 2px;
      appearance: none;
      -webkit-appearance: none;
      background-image: none;
    }
    .model-card.selected .card-model-id {
      color: var(--purple-dim);
      border-color: #DDD0F8;
      background: white;
    }
    .card-model-id:focus {
      border-color: var(--purple);
      color: var(--text);
      background: white;
    }
    .model-card.disabled .card-model-id { pointer-events: none; }
    .card-unavailable {
      font-size: 10px;
      color: var(--err);
      margin-top: 4px;
      font-weight: 500;
    }
    .card-check {
      position: absolute;
      top: 8px;
      right: 10px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--purple);
      display: none;
      align-items: center;
      justify-content: center;
    }
    .model-card.selected .card-check { display: flex; }
    .card-check::after {
      content: '';
      width: 6px;
      height: 4px;
      border-left: 1.5px solid white;
      border-bottom: 1.5px solid white;
      transform: rotate(-45deg) translateY(-1px);
    }

    /* Prompt row */
    .prompt-row { display: flex; gap: 12px; align-items: flex-start; }
    textarea {
      flex: 1;
      min-height: 48px;
      max-height: 120px;
      background: var(--bg);
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: var(--purple); }
    textarea::placeholder { color: var(--text-dim); }
    button {
      background: var(--purple);
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #6a10c4; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Delta bar ── */
    .delta {
      padding: 16px 24px;
      font-size: 13px;
      color: var(--text-mid);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .delta:empty { display: none; }
    .delta-row { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
    .delta-label { font-weight: 600; color: var(--text); margin-right: 4px; }
    .tool-diff { font-size: 12px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .tool-diff-label { font-weight: 600; margin-right: 2px; }
    .tool-tag {
      display: inline-flex; align-items: center;
      border-radius: 4px; padding: 2px 7px;
      font-size: 11px; font-weight: 500; border: 1px solid transparent;
    }
    .tool-tag-harness { background: var(--purple-tint); color: var(--purple); border-color: #DDD0F8; }
    .tool-tag-naive   { background: var(--amber-tint);  color: #92400E;       border-color: #FDE68A; }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
    }
    .pill-savings { background: #ECFDF5; color: #065F46; border-color: #A7F3D0; }
    .pill-cost    { background: #FFF1F5; color: var(--magenta); border-color: #FECDD3; }
    .pill-neutral { background: var(--bg); color: var(--text-mid); border-color: var(--border); }

    /* ── Stat tiles (prominent actual + delta metrics, fills full width) ── */
    .stat-tiles { display: flex; gap: 12px; flex-wrap: wrap; width: 100%; }
    .stat-tile {
      flex: 1 1 0; min-width: 150px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
    }
    .stat-tile.hero { border-color: #DDD0F8; background: var(--purple-tint); }
    .stat-delta { font-size: 27px; font-weight: 800; line-height: 1.05; letter-spacing: -0.6px; }
    .stat-delta.good    { color: #059669; }
    .stat-delta.bad     { color: var(--magenta); }
    .stat-delta.neutral { color: var(--navy); }
    .stat-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim); font-weight: 700; margin-top: 3px; }
    .stat-detail { font-size: 12px; color: var(--text-mid); font-family: ui-monospace, 'SF Mono', monospace; margin-top: 8px; line-height: 1.5; }
    .stat-detail .sv-h { color: var(--purple); font-weight: 600; }
    .stat-detail .sv-n { color: #B45309; font-weight: 600; }
    .stat-detail .sv-win { color: #059669; font-weight: 700; }

    /* ── Panels ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px 24px 24px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      min-width: 0;
    }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.8px; margin: 0; font-weight: 700; }
    .panel-harness h2 { color: var(--purple); }
    .panel-naive h2   { color: #B45309; }
    .panel-model h2   { color: var(--purple); }
    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .panel-harness .badge { background: var(--purple-tint); color: var(--purple); border: 1px solid #DDD0F8; }
    .panel-naive .badge   { background: var(--amber-tint);  color: #92400E;       border: 1px solid #FDE68A; }
    .panel-model .badge   { background: var(--purple-tint); color: var(--purple); border: 1px solid #DDD0F8;
                            font-family: ui-monospace, 'SF Mono', monospace; letter-spacing: 0; }

    .steps {
      font-size: 12px;
      font-family: ui-monospace, 'SF Mono', monospace;
      color: var(--text-dim);
      max-height: 180px;
      overflow-y: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 14px;
    }
    .step { margin-bottom: 2px; line-height: 1.5; word-break: break-word; }
    .step.err { color: var(--err); }
    .step.ok  { color: var(--ok); }

    .answer { font-size: 14px; line-height: 1.6; color: var(--text); }
    .answer table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .answer th { background: var(--bg); color: var(--text-mid); font-weight: 600; text-align: left; }
    .answer th, .answer td { border: 1px solid var(--border); padding: 6px 10px; }
    .answer code { background: var(--bg); padding: 1px 5px; border-radius: 4px; font-size: 12px; border: 1px solid var(--border); }
    .answer h3, .answer h4 { color: var(--navy); }

    .metrics {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      font-family: ui-monospace, 'SF Mono', monospace;
      line-height: 2;
    }
    .metrics .metric-val { color: var(--text-mid); font-weight: 500; }

    /* ── Showdown summary (leaderboard + tool matrix) ── */
    .summary { padding: 4px 24px 24px; }
    .summary:empty { display: none; }
    .summary h3 {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--navy); margin: 18px 0 8px;
    }
    .cmp-table { border-collapse: collapse; width: 100%; font-size: 12.5px; background: var(--surface);
                 border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .cmp-table th, .cmp-table td { border-bottom: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    .cmp-table thead th { background: var(--bg); color: var(--navy); font-weight: 700; }
    .cmp-table tbody th { font-weight: 600; color: var(--text-mid); white-space: nowrap; }
    .cmp-table td { color: var(--text); font-family: ui-monospace, 'SF Mono', monospace; }
    .cmp-table tr:last-child th, .cmp-table tr:last-child td { border-bottom: 0; }
    .cmp-provider { font-family: -apple-system, system-ui, sans-serif; font-weight: 700; color: var(--purple); }
    .cmp-provider small { display: block; font-family: ui-monospace, 'SF Mono', monospace; font-weight: 400;
                          color: var(--text-dim); font-size: 10.5px; }
    .cmp-best { background: #ECFDF5; color: #065F46; font-weight: 700; }
    .cmp-sub { display: block; font-size: 10.5px; font-weight: 400; color: var(--text-dim); margin-top: 2px; }
    .cmp-best .cmp-sub { color: #059669; font-weight: 600; }
    .cmp-sub.worse { color: var(--magenta); }
    .matrix td.hit { color: var(--purple); font-weight: 700; text-align: center; }
    .matrix td.miss { color: var(--text-dim); text-align: center; opacity: 0.4; }
    .matrix td.solo { background: var(--amber-tint); }
    .matrix tbody th { font-family: ui-monospace, 'SF Mono', monospace; font-weight: 500; font-size: 11.5px; }
  </style>
</head>
<body>
  <header>
    <span class="logo">Precisely</span>
    <span class="header-sep"></span>
    <span class="header-title">MCP Harness — model comparison</span>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="compare">Harness vs Naive</button>
    <button class="tab" data-tab="showdown">Model Showdown</button>
  </div>

  <!-- Shared prompt -->
  <div class="controls">
    <div class="prompt-row">
      <textarea id="prompt" placeholder="e.g. Assess wildfire and flood risk for 950 Josephine St, Denver CO, for an insurance adjuster."></textarea>
      <button id="run">Run</button>
    </div>
  </div>

  <!-- ── View: Harness vs Naive ── -->
  <div class="view active" id="view-compare">
    <div class="controls">
      <div class="model-cards" id="cards-compare"></div>
      <p class="controls-hint">Pick one model — it runs both with the harness (plan + subset routing) and naively (all tools, no plan).</p>
    </div>
    <div class="delta" id="delta"></div>
    <div class="panels">
      <div class="panel panel-harness">
        <div class="panel-header">
          <h2>Harness</h2>
          <span class="badge">plan + subset routing</span>
        </div>
        <div class="steps" id="steps-harness"></div>
        <div class="answer" id="answer-harness"></div>
        <div class="metrics" id="metrics-harness"></div>
      </div>
      <div class="panel panel-naive">
        <div class="panel-header">
          <h2>Naive</h2>
          <span class="badge">all tools, no plan</span>
        </div>
        <div class="steps" id="steps-naive"></div>
        <div class="answer" id="answer-naive"></div>
        <div class="metrics" id="metrics-naive"></div>
      </div>
    </div>
  </div>

  <!-- ── View: Model Showdown ── -->
  <div class="view" id="view-showdown">
    <div class="controls">
      <div class="model-cards" id="cards-showdown"></div>
      <p class="controls-hint">Pick 2–4 models — each runs with the harness (plan + subset routing) on the same prompt.</p>
    </div>
    <div class="summary" id="showdown-summary"></div>
    <div class="panels" id="showdown-panels"></div>
  </div>

  <script>
    const PROVIDER_LABELS = { claude: 'Claude', openai: 'OpenAI', gemini: 'Gemini', llama: 'Llama' };

    const PROVIDER_MODELS = {
      claude: [
        'claude-sonnet-4-6', 'claude-sonnet-5', 'claude-opus-4-8',
        'claude-opus-4-7', 'claude-haiku-4-5-20251001', 'claude-fable-5',
      ],
      openai: [
        'gpt-4o-mini', 'gpt-4o', 'gpt-4.1', 'gpt-4.1-mini', 'gpt-4.1-nano',
        'gpt-5', 'gpt-5.4', 'gpt-5.4-mini', 'gpt-5.5',
      ],
      gemini: [
        'gemini-2.5-pro', 'gemini-2.5-flash', 'gemini-2.5-flash-lite',
        'gemini-2.0-flash', 'gemini-3-pro-preview', 'gemini-3.1-pro-preview', 'gemini-3.5-flash',
      ],
      llama: ['llama3.1:8b-16k', 'llama3.1:8b', 'llama3.2:latest'],
    };

    const MAX_SHOWDOWN = 4;
    let AVAILABLE = [];              // raw /api/models response

    // ── Tabs ──
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById('view-' + t.dataset.tab).classList.add('active');
      });
    });

    function activeTab() {
      return document.querySelector('.tab.active').dataset.tab;
    }

    // ── Build a model card (radio = single-select for compare, multi = toggle for showdown) ──
    function buildCard(m, multi) {
      const card = document.createElement('label');
      card.className = 'model-card' + (m.available ? '' : ' disabled');
      card.dataset.model = m.name;
      const options = (PROVIDER_MODELS[m.name] || [m.model_id]).map(id =>
        `<option value="${id}" ${id === m.model_id ? 'selected' : ''}>${id}</option>`
      ).join('');
      card.innerHTML = `
        <div class="card-check"></div>
        <div class="card-provider">${PROVIDER_LABELS[m.name] || m.name}</div>
        <select class="card-model-id" ${!m.available ? 'disabled' : ''}>${options}</select>
        ${!m.available ? `<div class="card-unavailable">${m.reason}</div>` : ''}
      `;
      const sel = card.querySelector('.card-model-id');
      sel.addEventListener('click', e => e.stopPropagation());
      sel.addEventListener('mousedown', e => e.stopPropagation());

      if (m.available) {
        card.addEventListener('click', () => {
          if (multi) {
            const selected = card.parentElement.querySelectorAll('.model-card.selected');
            if (!card.classList.contains('selected') && selected.length >= MAX_SHOWDOWN) return;
            card.classList.toggle('selected');
          } else {
            card.parentElement.querySelectorAll('.model-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
          }
        });
      }
      return card;
    }

    async function loadModels() {
      const res = await fetch('/api/models');
      AVAILABLE = await res.json();

      const compareBox = document.getElementById('cards-compare');
      const showdownBox = document.getElementById('cards-showdown');
      let firstCompare = null;
      const availShowdown = [];

      AVAILABLE.forEach((m) => {
        const c = buildCard(m, false);
        compareBox.appendChild(c);
        if (m.available && !firstCompare) firstCompare = c;

        const s = buildCard(m, true);
        showdownBox.appendChild(s);
        if (m.available) availShowdown.push(s);
      });

      if (firstCompare) firstCompare.classList.add('selected');
      // default: pre-select the first two available models in the showdown
      availShowdown.slice(0, 2).forEach(c => c.classList.add('selected'));
    }

    function cardChoice(card) {
      return { model: card.dataset.model, modelId: card.querySelector('.card-model-id').value };
    }

    // ── Streaming ──
    function step(panel, text, cls) {
      const el = document.getElementById('steps-' + panel);
      if (!el) return;
      const d = document.createElement('div');
      d.className = 'step' + (cls ? ' ' + cls : '');
      d.textContent = text;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }

    function handle(panel, ev, store) {
      if (ev.type === 'planning') step(panel, '⋯ planning…');
      else if (ev.type === 'plan_warning') step(panel, '⚠ ' + ev.message, 'err');
      else if (ev.type === 'plan') step(panel, '✓ plan: ' + ev.plan.join(' → '));
      else if (ev.type === 'round') step(panel, '↻ round ' + ev.n + '  (' + ev.tokens.in + ' in / ' + ev.tokens.out + ' out)');
      else if (ev.type === 'tool_call') step(panel, '→ ' + ev.name);
      else if (ev.type === 'tool_result') step(panel, (ev.ok ? '✓ ' : '✗ ') + ev.name + '  ' + ev.ms + 'ms', ev.ok ? 'ok' : 'err');
      else if (ev.type === 'answer') { const a = document.getElementById('answer-' + panel); if (a) a.innerHTML = marked.parse(ev.text || ''); }
      else if (ev.type === 'error') step(panel, '✗ ERROR: ' + ev.message, 'err');
      else if (ev.type === 'done') {
        const m = ev.metrics || {};
        const secs = ((m.model_ms || 0) + (m.tool_ms || 0)) / 1000;
        const el = document.getElementById('metrics-' + panel);
        if (el) el.innerHTML =
          `tools called: <span class="metric-val">${(ev.tools_called || []).join(', ') || 'none'}</span><br>` +
          `tokens: <span class="metric-val">${(m.input_tokens || 0).toLocaleString()} in / ${(m.output_tokens || 0).toLocaleString()} out</span>  ` +
          `rounds: <span class="metric-val">${m.rounds || 0}</span>  ` +
          `cost: <span class="metric-val">$${ev.cost_usd ?? 'n/a'}</span>  ` +
          `time: <span class="metric-val">${secs.toFixed(1)}s</span><br>` +
          `tools sent: <span class="metric-val">${ev.tools_sent}/${ev.tools_available}</span>`;
        if (store) store[panel] = ev;
      }
    }

    function openStream(panel, model, modelId, prompt, mode, store, onSettled) {
      const url = `/api/stream?model=${encodeURIComponent(model)}&mode=${encodeURIComponent(mode)}`
                + `&prompt=${encodeURIComponent(prompt)}&model_id=${encodeURIComponent(modelId)}`;
      const es = new EventSource(url);
      let settled = false;
      const finish = () => { if (settled) return; settled = true; es.close(); if (onSettled) onSettled(); };
      es.onmessage = (e) => {
        const ev = JSON.parse(e.data);
        handle(panel, ev, store);
        if (ev.type === 'done' || ev.type === 'error') finish();
      };
      es.onerror = finish;
    }

    function clearPanel(panel) {
      ['steps-', 'answer-', 'metrics-'].forEach(p => {
        const el = document.getElementById(p + panel);
        if (el) el.innerHTML = '';
      });
    }

    // ══ Harness vs Naive ══
    const doneCompare = {};

    // Format a signed percentage where "lower is better" (savings shown green, negative).
    function pctDelta(harnessVal, naiveVal) {
      if (!naiveVal) return { pct: 0, cls: 'neutral', txt: '0%' };
      const p = Math.round((harnessVal - naiveVal) / naiveVal * 100);
      const cls = p < 0 ? 'good' : p > 0 ? 'bad' : 'neutral';
      return { pct: p, cls, txt: (p > 0 ? '+' : '') + p + '%' };
    }
    const fmtTok = v => (v || 0).toLocaleString();
    const fmtCost = v => v == null ? 'n/a' : '$' + Number(v).toFixed(4);

    // A stat tile: big delta headline + harness/naive actual values below.
    function statTile(label, delta, harnessStr, naiveStr, hero) {
      return `<div class="stat-tile ${hero ? 'hero' : ''}">
        <div class="stat-delta ${delta.cls}">${delta.txt}</div>
        <div class="stat-label">${label}</div>
        <div class="stat-detail"><span class="sv-h">${harnessStr}</span> harness<br><span class="sv-n">${naiveStr}</span> naive</div>
      </div>`;
    }

    function renderDelta() {
      if (!doneCompare.harness || !doneCompare.naive) return;
      const h = doneCompare.harness, n = doneCompare.naive;
      const hm = h.metrics, nm = n.metrics;
      const hTot = (hm.input_tokens || 0) + (hm.output_tokens || 0);
      const nTot = (nm.input_tokens || 0) + (nm.output_tokens || 0);

      const dCost = pctDelta(h.cost_usd || 0, n.cost_usd || 0);
      const dIn   = pctDelta(hm.input_tokens || 0, nm.input_tokens || 0);
      const dTot  = pctDelta(hTot, nTot);

      const hTools = new Set(h.tools_called || []);
      const nTools = new Set(n.tools_called || []);
      const dToolsN = hTools.size - nTools.size;
      const toolsDelta = { cls: 'neutral', txt: (dToolsN > 0 ? '+' : '') + dToolsN };

      const tiles =
        statTile('cost', dCost, fmtCost(h.cost_usd), fmtCost(n.cost_usd), true) +
        statTile('input tokens', dIn, fmtTok(hm.input_tokens), fmtTok(nm.input_tokens)) +
        statTile('total tokens', dTot, fmtTok(hTot), fmtTok(nTot)) +
        statTile('tools called', toolsDelta, hTools.size, nTools.size);

      const hOnly = [...hTools].filter(t => !nTools.has(t));
      const nOnly = [...nTools].filter(t => !hTools.has(t));
      const tags = (list, cls) => list.length
        ? list.map(t => `<span class="tool-tag ${cls}">${t}</span>`).join('')
        : `<span style="opacity:.5">none</span>`;

      let diffHtml = '';
      if (hOnly.length || nOnly.length) {
        diffHtml =
          `<div class="tool-diff">` +
          `<span class="tool-diff-label" style="color:var(--purple)">harness only:</span>${tags(hOnly, 'tool-tag-harness')}` +
          `<span class="tool-diff-label" style="color:#92400E;margin-left:10px">naive only:</span>${tags(nOnly, 'tool-tag-naive')}` +
          `</div>`;
      }

      document.getElementById('delta').innerHTML =
        `<div class="delta-label">Harness vs Naive — ${PROVIDER_LABELS[h.model_name] || h.model_name} (${h.model})</div>` +
        `<div class="stat-tiles">${tiles}</div>` + diffHtml;
    }

    function runCompare(prompt) {
      const card = document.querySelector('#cards-compare .model-card.selected');
      if (!card) return;
      const { model, modelId } = cardChoice(card);
      ['harness', 'naive'].forEach(p => { clearPanel(p); delete doneCompare[p]; });
      document.getElementById('delta').innerHTML = '';
      openStream('harness', model, modelId, prompt, 'harness', doneCompare, renderDelta);
      openStream('naive',   model, modelId, prompt, 'naive',   doneCompare, renderDelta);
    }

    // ══ Model Showdown ══
    let doneShowdown = {};
    let showdownKeys = [];
    let showdownSettled = 0;

    function runShowdown(prompt) {
      const cards = [...document.querySelectorAll('#cards-showdown .model-card.selected')];
      if (cards.length < 2) { alert('Select at least 2 models for a showdown.'); return; }

      const choices = cards.map(cardChoice);
      doneShowdown = {};
      showdownSettled = 0;
      showdownKeys = choices.map(c => 'sd-' + c.model);

      // Build panels
      const grid = document.getElementById('showdown-panels');
      const n = choices.length;
      grid.style.gridTemplateColumns = n <= 2 ? `repeat(${n}, 1fr)` : n === 3 ? 'repeat(3, 1fr)' : '1fr 1fr';
      grid.innerHTML = choices.map((c, i) => {
        const key = showdownKeys[i];
        return `<div class="panel panel-model">
            <div class="panel-header">
              <h2>${PROVIDER_LABELS[c.model] || c.model}</h2>
              <span class="badge">${c.modelId}</span>
            </div>
            <div class="steps" id="steps-${key}"></div>
            <div class="answer" id="answer-${key}"></div>
            <div class="metrics" id="metrics-${key}"></div>
          </div>`;
      }).join('');
      document.getElementById('showdown-summary').innerHTML = '';

      choices.forEach((c, i) => {
        openStream(showdownKeys[i], c.model, c.modelId, prompt, 'harness', doneShowdown, () => {
          showdownSettled++;
          if (showdownSettled >= showdownKeys.length) renderShowdownSummary();
        });
      });
    }

    function renderShowdownSummary() {
      const runs = showdownKeys.map(k => doneShowdown[k]).filter(Boolean);
      if (runs.length < 2) return;   // not enough completed to compare

      const secs = r => ((r.metrics.model_ms || 0) + (r.metrics.tool_ms || 0)) / 1000;
      const provider = r => `<span class="cmp-provider">${PROVIDER_LABELS[r.model_name] || r.model_name}<small>${r.model}</small></span>`;

      // Best (lowest) per row — cost, input tokens, time
      const costs = runs.map(r => r.cost_usd).filter(v => v != null);
      const minCost = costs.length ? Math.min(...costs) : null;
      const minIn   = Math.min(...runs.map(r => r.metrics.input_tokens || 0));
      const minTime = Math.min(...runs.map(secs));

      // Winner callout tiles (same design language as the harness-vs-naive summary)
      const label = r => PROVIDER_LABELS[r.model_name] || r.model_name;
      const cheapest = minCost == null ? null : runs.find(r => r.cost_usd === minCost);
      const leanest  = runs.find(r => (r.metrics.input_tokens || 0) === minIn);
      const fastest  = runs.find(r => secs(r) === minTime);
      const winTile = (title, winner, valStr) => `<div class="stat-tile hero">
          <div class="stat-delta neutral" style="font-size:20px">${winner ? label(winner) : 'n/a'}</div>
          <div class="stat-label">${title}</div>
          <div class="stat-detail"><span class="sv-win">${valStr}</span></div>
        </div>`;
      const winners =
        `<div class="stat-tiles" style="margin-bottom:6px">` +
        winTile('cheapest', cheapest, cheapest ? fmtCost(cheapest.cost_usd) : 'n/a') +
        winTile('fewest input tokens', leanest, (minIn).toLocaleString() + ' tokens') +
        winTile('fastest', fastest, minTime.toFixed(1) + 's') +
        `</div>`;

      const minTools = Math.min(...runs.map(r => (r.tools_called || []).length));

      const row = (label, cellFn) =>
        `<tr><th>${label}</th>${runs.map(cellFn).join('')}</tr>`;

      // Cell with a value + how much WORSE it is than the best (lower = better).
      const relCell = (val, best, str) => {
        if (val == null) return `<td>${str}</td>`;
        const isBest = best != null && val === best;
        const sub = isBest ? 'best' : best ? '+' + Math.round((val - best) / best * 100) + '%' : '—';
        return `<td class="${isBest ? 'cmp-best' : ''}">${str}<span class="cmp-sub ${isBest ? '' : 'worse'}">${sub}</span></td>`;
      };
      // Neutral count cell showing the difference (in tools) vs the fewest.
      const diffCell = (val, base) => {
        const sub = val === base ? '—' : '+' + (val - base);
        return `<td>${val}<span class="cmp-sub">${sub}</span></td>`;
      };

      const table =
        `<table class="cmp-table">
          <thead><tr><th>metric</th>${runs.map(r => `<th>${provider(r)}</th>`).join('')}</tr></thead>
          <tbody>
            ${row('cost',         r => relCell(r.cost_usd, minCost, fmtCost(r.cost_usd)))}
            ${row('input tokens', r => relCell(r.metrics.input_tokens || 0, minIn, (r.metrics.input_tokens || 0).toLocaleString()))}
            ${row('output tokens',r => `<td>${(r.metrics.output_tokens || 0).toLocaleString()}</td>`)}
            ${row('time',         r => relCell(secs(r), minTime, secs(r).toFixed(1) + 's'))}
            ${row('tools called', r => diffCell((r.tools_called || []).length, minTools))}
            ${row('tools sent',   r => `<td>${r.tools_sent}/${r.tools_available}</td>`)}
            ${row('rounds',       r => `<td>${r.metrics.rounds || 0}</td>`)}
            ${row('plan complete',r => `<td>${r.plan_complete ? '✓' : '✗'}</td>`)}
          </tbody>
        </table>`;

      // Tools × models matrix
      const allTools = [...new Set(runs.flatMap(r => r.tools_called || []))].sort();
      let matrix = '';
      if (allTools.length) {
        const rows = allTools.map(tool => {
          const hits = runs.map(r => (r.tools_called || []).includes(tool));
          const solo = hits.filter(Boolean).length === 1;
          const cells = hits.map(h =>
            `<td class="${h ? 'hit' : 'miss'} ${solo && h ? 'solo' : ''}">${h ? '✓' : '·'}</td>`).join('');
          return `<tr><th>${tool}</th>${cells}</tr>`;
        }).join('');
        matrix =
          `<h3>Tools called per model</h3>
           <table class="cmp-table matrix">
             <thead><tr><th>tool</th>${runs.map(r => `<th>${provider(r)}</th>`).join('')}</tr></thead>
             <tbody>${rows}</tbody>
           </table>`;
      }

      document.getElementById('showdown-summary').innerHTML =
        `<h3>Winners</h3>${winners}<h3>Leaderboard</h3>${table}${matrix}`;
    }

    // ── Run button (branches on active tab) ──
    document.getElementById('run').addEventListener('click', () => {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return;
      if (activeTab() === 'compare') runCompare(prompt);
      else runShowdown(prompt);
    });

    loadModels();
  </script>
</body>
</html>
