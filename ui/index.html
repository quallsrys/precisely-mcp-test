<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Harness Comparison — Precisely MCP</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Precisely brand — light mode
       Purple #7F16E0  Navy #001B4C  Amber #FAB511  Magenta #E5007E */
    :root {
      font-family: -apple-system, system-ui, sans-serif;
      --bg:           #F5F6FA;
      --surface:      #FFFFFF;
      --border:       #E2E4EE;
      --purple:       #7F16E0;
      --purple-tint:  #F3EAFF;
      --purple-dim:   #39006A;
      --navy:         #001B4C;
      --amber:        #FAB511;
      --amber-tint:   #FFF9E6;
      --magenta:      #E5007E;
      --text:         #001B4C;
      --text-mid:     #3D4A6B;
      --text-dim:     #8B93A8;
      --ok:           #059669;
      --err:          #E5007E;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo { font-size: 15px; font-weight: 800; letter-spacing: 1px; color: var(--purple); text-transform: uppercase; }
    .header-sep { width: 1px; height: 20px; background: var(--border); }
    .header-title { font-size: 14px; color: var(--text-mid); font-weight: 400; }

    /* ── Controls ── */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Model cards */
    .model-cards { display: flex; gap: 12px; flex-wrap: wrap; }
    .model-card {
      position: relative;
      width: 160px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      user-select: none;
    }
    .model-card:hover:not(.disabled) {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(127,22,224,0.08);
    }
    .model-card.selected {
      border-color: var(--purple);
      background: var(--purple-tint);
      box-shadow: 0 0 0 3px rgba(127,22,224,0.12);
    }
    .model-card.disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .model-card input[type="radio"] { display: none; }
    .card-provider {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 3px;
    }
    .model-card.selected .card-provider { color: var(--purple); }
    .card-model-id {
      font-size: 11px;
      font-family: ui-monospace, 'SF Mono', monospace;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-unavailable {
      font-size: 10px;
      color: var(--err);
      margin-top: 4px;
      font-weight: 500;
    }
    .card-check {
      position: absolute;
      top: 8px;
      right: 10px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--purple);
      display: none;
      align-items: center;
      justify-content: center;
    }
    .model-card.selected .card-check { display: flex; }
    .card-check::after {
      content: '';
      width: 6px;
      height: 4px;
      border-left: 1.5px solid white;
      border-bottom: 1.5px solid white;
      transform: rotate(-45deg) translateY(-1px);
    }

    /* Prompt row */
    .prompt-row { display: flex; gap: 12px; align-items: flex-start; }
    textarea {
      flex: 1;
      min-height: 48px;
      max-height: 120px;
      background: var(--bg);
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: var(--purple); }
    textarea::placeholder { color: var(--text-dim); }
    button {
      background: var(--purple);
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #6a10c4; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Delta bar ── */
    .delta {
      padding: 10px 24px;
      font-size: 13px;
      color: var(--text-mid);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .delta-label { font-weight: 600; color: var(--text); margin-right: 4px; }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
    }
    .pill-savings { background: #ECFDF5; color: #065F46; border-color: #A7F3D0; }
    .pill-cost    { background: #FFF1F5; color: var(--magenta); border-color: #FECDD3; }
    .pill-neutral { background: var(--bg); color: var(--text-mid); border-color: var(--border); }

    /* ── Panels ── */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 16px 24px 24px;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
    }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.8px; margin: 0; font-weight: 700; }
    .panel-harness h2 { color: var(--purple); }
    .panel-naive h2   { color: #B45309; }
    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .panel-harness .badge { background: var(--purple-tint); color: var(--purple); border: 1px solid #DDD0F8; }
    .panel-naive .badge   { background: var(--amber-tint);  color: #92400E;       border: 1px solid #FDE68A; }

    .steps {
      font-size: 12px;
      font-family: ui-monospace, 'SF Mono', monospace;
      color: var(--text-dim);
      max-height: 180px;
      overflow-y: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 14px;
    }
    .step { margin-bottom: 2px; line-height: 1.5; }
    .step.err { color: var(--err); }
    .step.ok  { color: var(--ok); }

    .answer { font-size: 14px; line-height: 1.6; color: var(--text); }
    .answer table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .answer th { background: var(--bg); color: var(--text-mid); font-weight: 600; text-align: left; }
    .answer th, .answer td { border: 1px solid var(--border); padding: 6px 10px; }
    .answer code { background: var(--bg); padding: 1px 5px; border-radius: 4px; font-size: 12px; border: 1px solid var(--border); }
    .answer h3, .answer h4 { color: var(--navy); }

    .metrics {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      font-family: ui-monospace, 'SF Mono', monospace;
      line-height: 2;
    }
    .metrics .metric-val { color: var(--text-mid); font-weight: 500; }
  </style>
</head>
<body>
  <header>
    <span class="logo">Precisely</span>
    <span class="header-sep"></span>
    <span class="header-title">MCP Harness — Harness vs Naive comparison</span>
  </header>

  <div class="controls">
    <div class="model-cards" id="model-cards"></div>
    <div class="prompt-row">
      <textarea id="prompt" placeholder="e.g. Assess wildfire and flood risk for 950 Josephine St, Denver CO, for an insurance adjuster."></textarea>
      <button id="run">Run comparison</button>
    </div>
  </div>

  <div class="delta" id="delta"></div>

  <div class="panels">
    <div class="panel panel-harness">
      <div class="panel-header">
        <h2>Harness</h2>
        <span class="badge">plan + subset routing</span>
      </div>
      <div class="steps" id="steps-harness"></div>
      <div class="answer" id="answer-harness"></div>
      <div class="metrics" id="metrics-harness"></div>
    </div>
    <div class="panel panel-naive">
      <div class="panel-header">
        <h2>Naive</h2>
        <span class="badge">all tools, no plan</span>
      </div>
      <div class="steps" id="steps-naive"></div>
      <div class="answer" id="answer-naive"></div>
      <div class="metrics" id="metrics-naive"></div>
    </div>
  </div>

  <script>
    const doneState = {};

    const PROVIDER_LABELS = { claude: 'Claude', openai: 'OpenAI', gemini: 'Gemini', llama: 'Llama' };

    async function loadModels() {
      const res = await fetch('/api/models');
      const models = await res.json();
      const box = document.getElementById('model-cards');
      let firstAvailable = null;

      models.forEach((m) => {
        const card = document.createElement('label');
        card.className = 'model-card' + (m.available ? '' : ' disabled');
        card.innerHTML = `
          <input type="radio" name="model" value="${m.name}" ${m.available ? '' : 'disabled'}>
          <div class="card-check"></div>
          <div class="card-provider">${PROVIDER_LABELS[m.name] || m.name}</div>
          <div class="card-model-id">${m.model_id || '—'}</div>
          ${!m.available ? `<div class="card-unavailable">${m.reason}</div>` : ''}
        `;

        if (m.available) {
          card.addEventListener('click', () => {
            document.querySelectorAll('.model-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
          });
          if (!firstAvailable) {
            firstAvailable = card;
          }
        }
        box.appendChild(card);
      });

      if (firstAvailable) {
        firstAvailable.classList.add('selected');
        firstAvailable.querySelector('input').checked = true;
      }
    }

    function step(panel, text, cls) {
      const el = document.getElementById('steps-' + panel);
      const d = document.createElement('div');
      d.className = 'step' + (cls ? ' ' + cls : '');
      d.textContent = text;
      el.appendChild(d);
      el.scrollTop = el.scrollHeight;
    }

    function handle(panel, ev) {
      if (ev.type === 'planning') step(panel, '⋯ planning…');
      else if (ev.type === 'plan') step(panel, '✓ plan: ' + ev.plan.join(' → '));
      else if (ev.type === 'round') step(panel, '↻ round ' + ev.n + '  (' + ev.tokens.in + ' in / ' + ev.tokens.out + ' out)');
      else if (ev.type === 'tool_call') step(panel, '→ ' + ev.name);
      else if (ev.type === 'tool_result') step(panel, (ev.ok ? '✓ ' : '✗ ') + ev.name + '  ' + ev.ms + 'ms', ev.ok ? 'ok' : 'err');
      else if (ev.type === 'answer') document.getElementById('answer-' + panel).innerHTML = marked.parse(ev.text || '');
      else if (ev.type === 'error') step(panel, '✗ ERROR: ' + ev.message, 'err');
      else if (ev.type === 'done') {
        const m = ev.metrics || {};
        const secs = ((m.model_ms || 0) + (m.tool_ms || 0)) / 1000;
        const metricsEl = document.getElementById('metrics-' + panel);
        metricsEl.innerHTML =
          `tools called: <span class="metric-val">${(ev.tools_called || []).join(', ') || 'none'}</span><br>` +
          `tokens: <span class="metric-val">${(m.input_tokens || 0).toLocaleString()} in / ${(m.output_tokens || 0).toLocaleString()} out</span>  ` +
          `rounds: <span class="metric-val">${m.rounds || 0}</span>  ` +
          `cost: <span class="metric-val">$${ev.cost_usd ?? 'n/a'}</span>  ` +
          `time: <span class="metric-val">${secs.toFixed(1)}s</span><br>` +
          `tools sent: <span class="metric-val">${ev.tools_sent}/${ev.tools_available}</span>`;
        doneState[panel] = ev;
        renderDelta();
      }
    }

    function renderDelta() {
      if (!doneState.harness || !doneState.naive) return;
      const h = doneState.harness, n = doneState.naive;
      const pct = (a, b) => b ? Math.round((a - b) / b * 100) : 0;
      const dCost = pct(h.cost_usd, n.cost_usd);
      const dTok  = pct(h.metrics.input_tokens, n.metrics.input_tokens);
      const dTools = (h.tools_called || []).length - (n.tools_called || []).length;

      const pill = (label, val, unit = '') => {
        const cls = val < 0 ? 'pill-savings' : val > 0 ? 'pill-cost' : 'pill-neutral';
        const sign = val > 0 ? '+' : '';
        return `<span class="pill ${cls}">${label} ${sign}${val}${unit}</span>`;
      };

      document.getElementById('delta').innerHTML =
        `<span class="delta-label">Δ harness vs naive:</span>` +
        pill('cost', dCost, '%') +
        pill('input tokens', dTok, '%') +
        pill('tools called', dTools);
    }

    function openStream(panel, model, prompt) {
      const url = `/api/stream?model=${encodeURIComponent(model)}&mode=${panel}&prompt=${encodeURIComponent(prompt)}`;
      const es = new EventSource(url);
      es.onmessage = (e) => {
        const ev = JSON.parse(e.data);
        handle(panel, ev);
        if (ev.type === 'done' || ev.type === 'error') es.close();
      };
      es.onerror = () => es.close();
    }

    document.getElementById('run').addEventListener('click', () => {
      const prompt = document.getElementById('prompt').value.trim();
      const model = (document.querySelector('input[name=model]:checked') || {}).value;
      if (!prompt || !model) return;
      ['harness', 'naive'].forEach(p => {
        document.getElementById('steps-' + p).innerHTML = '';
        document.getElementById('answer-' + p).innerHTML = '';
        document.getElementById('metrics-' + p).innerHTML = '';
        delete doneState[p];
      });
      document.getElementById('delta').innerHTML = '';
      openStream('harness', model, prompt);
      openStream('naive', model, prompt);
    });

    loadModels();
  </script>
</body>
</html>
